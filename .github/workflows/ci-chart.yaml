name: chart-ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-and-template:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Helm dependency update
        run: helm dependency update ./charts/nexus

      - name: Helm lint (chart defaults)
        run: helm lint ./charts/nexus

      - name: Helm lint (minimal example)
        run: helm lint ./charts/nexus -f ./examples/values.example.minimal.yaml

      - name: Helm template smoke test
        run: helm template nexus-free ./charts/nexus -f ./examples/values.example.minimal.yaml > /tmp/rendered.yaml

      - name: Validate rendered output is non-empty
        run: test -s /tmp/rendered.yaml
