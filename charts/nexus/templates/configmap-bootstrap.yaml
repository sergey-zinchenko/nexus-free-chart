    JSON
    upsert_json_resource "/security/roles/{{ include "nexus.bootstrapRoleId" (dict "format" "npm" "name" $repo.name "access" "read") }}" "/security/roles" "/security/roles/{{ include "nexus.bootstrapRoleId" (dict "format" "npm" "name" $repo.name "access" "read") }}" "${WORKDIR}/role-npm-{{ regexReplaceAll "[^a-z0-9]+" (lower $repo.name) "-" | trimAll "-" }}.json" "role for npm repository {{ $repo.name }}"
{{- end }}
  {{- range $repo := .Values.bootstrap.repositories.npmHosted }}

    cat > "${WORKDIR}/repo-npm-hosted-{{ regexReplaceAll "[^a-z0-9]+" (lower $repo.name) "-" | trimAll "-" }}.json" <<'JSON'
    {{ dict "name" $repo.name "online" (default true $repo.online) "storage" (dict "blobStoreName" (default "default" $repo.blobStoreName) "strictContentTypeValidation" (default true $repo.strictContentTypeValidation) "writePolicy" (default "ALLOW" $repo.writePolicy)) | toJson }}
