{{- if .Values.bootstrap.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nexus.bootstrapConfigMapName" . }}
  labels:
    {{- include "nexus.labels" . | nindent 4 }}
    {{- if .Values.nexus.extraLabels }}
      {{- with .Values.nexus.extraLabels }}
        {{ toYaml . | nindent 4 }}
      {{- end }}
    {{- end }}
data:
  bootstrap.sh: |
    #!/bin/sh
    set -eu

    NEXUS_API="${NEXUS_URL}/service/rest/v1"
    WORKDIR="/work"

    mkdir -p "${WORKDIR}"

    curl_json() {
      method="$1"
      path="$2"
      expected="$3"
      payload_file="${4:-}"

      if [ -n "${payload_file}" ]; then
        response=$(curl -sS -w '\n%{http_code}' --max-time 60 \
          -u "admin:${NEXUS_ADMIN_PASSWORD}" \
          -H "Content-Type: application/json" \
          -X "${method}" "${NEXUS_API}${path}" \
          --data-binary "@${payload_file}")
      else
        response=$(curl -sS -w '\n%{http_code}' --max-time 60 \
          -u "admin:${NEXUS_ADMIN_PASSWORD}" \
          -X "${method}" "${NEXUS_API}${path}")
      fi

      status=$(printf '%s\n' "${response}" | tail -n 1)
      body=$(printf '%s\n' "${response}" | sed '$d')

      case " ${expected} " in
        *" ${status} "*)
          echo "${method} ${path} -> HTTP ${status}"
          return 0
          ;;
      esac

      echo "ERROR: ${method} ${path} returned HTTP ${status}" >&2
      if [ -n "${body}" ]; then
        echo "${body}" >&2
      fi
      return 1
    }

    resource_exists() {
      path="$1"
      curl -sf -o /dev/null --max-time 30 \
        -u "admin:${NEXUS_ADMIN_PASSWORD}" \
        "${NEXUS_API}${path}"
    }

    json_escape() {
      printf '%s' "$1" | sed 's/\\/\\\\/g; s/"/\\"/g'
    }

    wait_for_nexus() {
      elapsed=0
      until curl -sf -o /dev/null "${NEXUS_API}/status/writable"; do
        elapsed=$((elapsed + 15))
        if [ "${elapsed}" -ge 900 ]; then
          echo "ERROR: Nexus did not become writable within 900 seconds" >&2
          exit 1
        fi
        echo "Waiting for Nexus writable status... ${elapsed}s"
        sleep 15
      done
    }

    upsert_json_resource() {
      exists_path="$1"
      create_path="$2"
      update_path="$3"
      payload_file="$4"
      description="$5"

      if resource_exists "${exists_path}"; then
        echo "Updating ${description}"
        curl_json PUT "${update_path}" "200 204" "${payload_file}"
      else
        echo "Creating ${description}"
        curl_json POST "${create_path}" "200 201 204" "${payload_file}"
      fi
    }

    wait_for_nexus

    # Activate Docker Bearer Token realm (required for docker login)
    echo '["NexusAuthenticatingRealm","DockerToken"]' > "${WORKDIR}/realms.json"
    curl_json PUT "/security/realms/active" "204" "${WORKDIR}/realms.json"

{{- range $repo := .Values.bootstrap.repositories.pypiProxy }}

    cat > "${WORKDIR}/repo-pypi-{{ regexReplaceAll "[^a-z0-9]+" (lower $repo.name) "-" | trimAll "-" }}.json" <<'JSON'
    {{ dict "name" $repo.name "online" (default true $repo.online) "storage" (dict "blobStoreName" (default "default" $repo.blobStoreName) "strictContentTypeValidation" (default true $repo.strictContentTypeValidation)) "proxy" (dict "remoteUrl" $repo.remoteUrl "contentMaxAge" (default 1440 $repo.contentMaxAge) "metadataMaxAge" (default 1440 $repo.metadataMaxAge)) "negativeCache" (dict "enabled" (default true $repo.negativeCacheEnabled) "timeToLive" (default 1440 $repo.negativeCacheTtl)) "httpClient" (dict "blocked" (default false $repo.httpClientBlocked) "autoBlock" (default true $repo.httpClientAutoBlock)) | toJson }}
    JSON
    upsert_json_resource "/repositories/pypi/proxy/{{ $repo.name }}" "/repositories/pypi/proxy" "/repositories/pypi/proxy/{{ $repo.name }}" "${WORKDIR}/repo-pypi-{{ regexReplaceAll "[^a-z0-9]+" (lower $repo.name) "-" | trimAll "-" }}.json" "pypi proxy repository {{ $repo.name }}"
    cat > "${WORKDIR}/role-pypi-{{ regexReplaceAll "[^a-z0-9]+" (lower $repo.name) "-" | trimAll "-" }}.json" <<'JSON'
    {{ dict "id" (include "nexus.bootstrapRoleId" (dict "format" "pypi" "name" $repo.name "access" "read")) "name" (printf "Helm read access for PyPI repository %s" $repo.name) "description" (printf "Read-only access to PyPI repository %s managed by Helm" $repo.name) "privileges" (list (printf "nx-repository-view-pypi-%s-browse" $repo.name) (printf "nx-repository-view-pypi-%s-read" $repo.name)) "roles" (list) | toJson }}
    JSON
    upsert_json_resource "/security/roles/{{ include "nexus.bootstrapRoleId" (dict "format" "pypi" "name" $repo.name "access" "read") }}" "/security/roles" "/security/roles/{{ include "nexus.bootstrapRoleId" (dict "format" "pypi" "name" $repo.name "access" "read") }}" "${WORKDIR}/role-pypi-{{ regexReplaceAll "[^a-z0-9]+" (lower $repo.name) "-" | trimAll "-" }}.json" "role for pypi repository {{ $repo.name }}"
{{- end }}
