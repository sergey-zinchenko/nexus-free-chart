    JSON
    upsert_json_resource "/repositories/pypi/group/{{ $repo.name }}" "/repositories/pypi/group" "/repositories/pypi/group/{{ $repo.name }}" "${WORKDIR}/repo-pypi-group-{{ regexReplaceAll "[^a-z0-9]+" (lower $repo.name) "-" | trimAll "-" }}.json" "pypi group repository {{ $repo.name }}"
    cat > "${WORKDIR}/role-pypi-group-{{ regexReplaceAll "[^a-z0-9]+" (lower $repo.name) "-" | trimAll "-" }}.json" <<'JSON'
    {{ dict "id" (include "nexus.bootstrapRoleId" (dict "format" "pypi" "name" $repo.name "access" "read")) "name" (printf "Helm read access for PyPI repository %s" $repo.name) "description" (printf "Read-only access to PyPI repository %s managed by Helm" $repo.name) "privileges" (list (printf "nx-repository-view-pypi-%s-browse" $repo.name) (printf "nx-repository-view-pypi-%s-read" $repo.name)) "roles" (list) | toJson }}
    JSON
    upsert_json_resource "/security/roles/{{ include "nexus.bootstrapRoleId" (dict "format" "pypi" "name" $repo.name "access" "read") }}" "/security/roles" "/security/roles/{{ include "nexus.bootstrapRoleId" (dict "format" "pypi" "name" $repo.name "access" "read") }}" "${WORKDIR}/role-pypi-group-{{ regexReplaceAll "[^a-z0-9]+" (lower $repo.name) "-" | trimAll "-" }}.json" "role for pypi group repository {{ $repo.name }}"
  {{- end }}
