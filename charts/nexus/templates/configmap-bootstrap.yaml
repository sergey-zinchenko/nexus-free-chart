{{- range $repo := .Values.bootstrap.repositories.mavenGroup }}{{- if $repo.allowAnonymousAccess }}{{- $anonRoles = append $anonRoles (include "nexus.bootstrapRoleId" (dict "format" "maven2" "name" $repo.name "access" "read")) }}{{- end }}{{- end }}
{{- range $repo := .Values.bootstrap.repositories.huggingfaceProxy }}{{- if $repo.allowAnonymousAccess }}{{- $anonRoles = append $anonRoles (include "nexus.bootstrapRoleId" (dict "format" "huggingface" "name" $repo.name "access" "read")) }}{{- end }}{{- end }}
{{- range $repo := .Values.bootstrap.repositories.rawProxy }}{{- if $repo.allowAnonymousAccess }}{{- $anonRoles = append $anonRoles (include "nexus.bootstrapRoleId" (dict "format" "raw" "name" $repo.name "access" "read")) }}{{- end }}{{- end }}
{{- range $repo := .Values.bootstrap.repositories.rawHosted }}{{- if $repo.allowAnonymousAccess }}{{- $anonRoles = append $anonRoles (include "nexus.bootstrapRoleId" (dict "format" "raw" "name" $repo.name "access" "read")) }}{{- end }}{{- end }}
{{- range $repo := .Values.bootstrap.repositories.rawGroup }}{{- if $repo.allowAnonymousAccess }}{{- $anonRoles = append $anonRoles (include "nexus.bootstrapRoleId" (dict "format" "raw" "name" $repo.name "access" "read")) }}{{- end }}{{- end }}
{{- $anonRoles = uniq $anonRoles }}
{{- $anonymousEnabled := gt (len $anonRoles) 0 }}
{{- if $anonymousEnabled }}

    # Grant anonymous access only to explicitly allowed repositories.
    cat > "${WORKDIR}/anon-user.json" <<'JSON'
    {{ dict "userId" "anonymous" "firstName" "Anonymous" "lastName" "User" "emailAddress" "anonymous@example.org" "source" "default" "status" "active" "roles" $anonRoles | toJson }}
    JSON
    curl_json PUT "/security/users/anonymous" "200 204" "${WORKDIR}/anon-user.json"
{{- end }}

{{- if $anonymousEnabled }}
    # Anonymous for selected repositories requires both per-repository grants and global anonymous enabled.
    cat > "${WORKDIR}/anon-access.json" <<'JSON'
    {"enabled": true, "userId": "anonymous", "realmName": "NexusAuthorizingRealm"}
    JSON
    curl_json PUT "/security/anonymous" "200" "${WORKDIR}/anon-access.json"
{{- else }}
    cat > "${WORKDIR}/anon-access.json" <<'JSON'
    {"enabled": false, "userId": "anonymous", "realmName": "NexusAuthorizingRealm"}
    JSON
    curl_json PUT "/security/anonymous" "200" "${WORKDIR}/anon-access.json"
{{- end }}
{{- range $user := .Values.bootstrap.users }}
{{- $roles := list }}
{{- if $user.isAdmin }}
{{- $roles = append $roles "nx-admin" }}
{{- end }}
{{- range $role := default (list) $user.roles }}
{{- $roles = append $roles $role }}
{{- end }}
{{- with $user.repositoryAccess }}
{{- with .pypi }}
{{- range $name, $enabled := . }}
{{- if $enabled }}
{{- $roles = append $roles (include "nexus.bootstrapRoleId" (dict "format" "pypi" "name" $name "access" "read")) }}
{{- end }}
{{- end }}
{{- end }}
{{- with .npm }}
{{- range $name, $enabled := . }}
{{- if $enabled }}
{{- $roles = append $roles (include "nexus.bootstrapRoleId" (dict "format" "npm" "name" $name "access" "read")) }}
{{- end }}
{{- end }}
{{- end }}
{{- with .docker }}
{{- range $name, $enabled := . }}
{{- if $enabled }}
{{- $roles = append $roles (include "nexus.bootstrapRoleId" (dict "format" "docker" "name" $name "access" "read")) }}
{{- end }}
{{- end }}
{{- end }}
{{- with .huggingface }}
{{- range $name, $enabled := . }}
{{- if $enabled }}
{{- $roles = append $roles (include "nexus.bootstrapRoleId" (dict "format" "huggingface" "name" $name "access" "read")) }}
{{- end }}
{{- end }}
{{- end }}
{{- with .nuget }}
{{- range $name, $enabled := . }}
{{- if $enabled }}
{{- $roles = append $roles (include "nexus.bootstrapRoleId" (dict "format" "nuget" "name" $name "access" "read")) }}
{{- end }}
{{- end }}
{{- end }}
{{- with .maven }}
{{- range $name, $enabled := . }}
{{- if $enabled }}
{{- $roles = append $roles (include "nexus.bootstrapRoleId" (dict "format" "maven2" "name" $name "access" "read")) }}
{{- end }}
{{- end }}
{{- end }}
{{- with .raw }}
{{- range $name, $enabled := . }}
{{- if $enabled }}
{{- $roles = append $roles (include "nexus.bootstrapRoleId" (dict "format" "raw" "name" $name "access" "read")) }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- $roles = uniq $roles }}

    user_password=""
{{- if $user.password }}
    user_password="$(cat <<'PASSWORD'
    {{ $user.password }}
    PASSWORD
    )"
{{- else if and $user.passwordFromSecret $user.passwordFromSecret.name $user.passwordFromSecret.key }}
    if [ -f "/bootstrap-secrets/{{ $user.userId }}.password" ]; then
      user_password="$(cat /bootstrap-secrets/{{ $user.userId }}.password)"
    fi
{{- end }}
    user_password_escaped="$(json_escape "${user_password}")"
    cat > "${WORKDIR}/user-{{ regexReplaceAll "[^a-z0-9]+" (lower $user.userId) "-" | trimAll "-" }}-create.json" <<JSON
    {"userId":{{ $user.userId | quote }},"firstName":{{ $user.firstName | quote }},"lastName":{{ $user.lastName | quote }},"emailAddress":{{ $user.emailAddress | quote }},"password":"${user_password_escaped}","status":{{ default "active" $user.status | quote }},"roles":{{ toJson $roles }}}
    JSON
    cat > "${WORKDIR}/user-{{ regexReplaceAll "[^a-z0-9]+" (lower $user.userId) "-" | trimAll "-" }}-update.json" <<'JSON'
    {{ dict "userId" $user.userId "firstName" $user.firstName "lastName" $user.lastName "emailAddress" $user.emailAddress "status" (default "active" $user.status) "source" "default" "roles" $roles | toJson }}
    JSON

    # Try update first; if user doesn't exist (404), create it
    echo "Upserting user {{ $user.userId }}"
    update_response=$(curl -sS -w '\n%{http_code}' --max-time 60 \
      -u "admin:${NEXUS_ADMIN_PASSWORD}" \
      -H "Content-Type: application/json" \
      -X PUT "${NEXUS_API}/security/users/{{ $user.userId }}" \
      --data-binary "@${WORKDIR}/user-{{ regexReplaceAll "[^a-z0-9]+" (lower $user.userId) "-" | trimAll "-" }}-update.json")
    update_status=$(printf '%s\n' "${update_response}" | tail -n 1)

    if [ "${update_status}" = "404" ]; then
      # User doesn't exist, create it
      if [ -z "${user_password}" ]; then
        echo "ERROR: cannot create user {{ $user.userId }} without password or passwordFromSecret" >&2
        exit 1
      fi
      curl_json POST "/security/users" "200 201 204" "${WORKDIR}/user-{{ regexReplaceAll "[^a-z0-9]+" (lower $user.userId) "-" | trimAll "-" }}-create.json"
    elif [ "${update_status}" = "200" ] || [ "${update_status}" = "204" ]; then
      echo "PUT /security/users/{{ $user.userId }} -> HTTP ${update_status}"
    else
      echo "ERROR: PUT /security/users/{{ $user.userId }} returned HTTP ${update_status}" >&2
      printf '%s\n' "${update_response}" | sed '$d' >&2
      exit 1
    fi
{{- end }}

    echo "Nexus bootstrap completed successfully."

{{- if .Values.bootstrap.repositoryCleanup.enabled }}
  cleanup-orphan-repositories.sh: |
    #!/bin/sh
    set -eu

    NEXUS_API="${NEXUS_URL}/service/rest/v1"
    WORKDIR="/work"
    CLEANUP_MARKER_ROLE="helm-repository-cleanup-v2-completed"
    mkdir -p "${WORKDIR}"

    resource_exists() {
      path="$1"
      curl -sf -o /dev/null --max-time 30 \
        -u "admin:${NEXUS_ADMIN_PASSWORD}" \
        "${NEXUS_API}${path}"
    }

    wait_for_nexus() {
      elapsed=0
      until curl -sf -o /dev/null "${NEXUS_API}/status/writable"; do
        elapsed=$((elapsed + 15))
        if [ "${elapsed}" -ge 900 ]; then
          echo "ERROR: Nexus did not become writable within 900 seconds" >&2
          exit 1
        fi
        echo "Waiting for Nexus writable status... ${elapsed}s"
        sleep 15
      done
    }

    delete_repo_by_name() {
      repo_name="$1"
      repo_format="$2"
      repo_type="$3"

      delete_status=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 60 \
        -u "admin:${NEXUS_ADMIN_PASSWORD}" \
        -X DELETE "${NEXUS_API}/repositories/${repo_name}")

      if [ "${delete_status}" = "204" ] || [ "${delete_status}" = "404" ]; then
        echo "DELETE /repositories/${repo_name} -> HTTP ${delete_status}"
        return 0
      fi

      if [ "${delete_status}" = "405" ] && [ -n "${repo_format}" ] && [ -n "${repo_type}" ]; then
        delete_status2=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 60 \
          -u "admin:${NEXUS_ADMIN_PASSWORD}" \
          -X DELETE "${NEXUS_API}/repositories/${repo_format}/${repo_type}/${repo_name}")
        if [ "${delete_status2}" = "204" ] || [ "${delete_status2}" = "404" ]; then
          echo "DELETE /repositories/${repo_format}/${repo_type}/${repo_name} -> HTTP ${delete_status2}"
          return 0
        fi
        echo "ERROR: DELETE /repositories/${repo_format}/${repo_type}/${repo_name} returned HTTP ${delete_status2}" >&2
        return 1
      fi

      echo "ERROR: DELETE /repositories/${repo_name} returned HTTP ${delete_status}" >&2
      return 1
    }

    wait_for_nexus

    if resource_exists "/security/roles/${CLEANUP_MARKER_ROLE}"; then
      echo "Repository cleanup already completed earlier, skipping."
      exit 0
    fi

    cat > "${WORKDIR}/managed-repositories.txt" <<'EOF'
{{- range $repo := .Values.bootstrap.repositories.pypiProxy }}
    {{ $repo.name }}
{{- end }}
{{- range $repo := .Values.bootstrap.repositories.pypiHosted }}
    {{ $repo.name }}
{{- end }}
{{- range $repo := .Values.bootstrap.repositories.pypiGroup }}
    {{ $repo.name }}
{{- end }}
{{- range $repo := .Values.bootstrap.repositories.npmProxy }}
    {{ $repo.name }}
{{- end }}
{{- range $repo := .Values.bootstrap.repositories.npmHosted }}
    {{ $repo.name }}
{{- end }}
{{- range $repo := .Values.bootstrap.repositories.npmGroup }}
    {{ $repo.name }}
{{- end }}
{{- range $repo := .Values.bootstrap.repositories.dockerProxy }}
    {{ $repo.name }}
{{- end }}
{{- range $repo := .Values.bootstrap.repositories.dockerHosted }}
    {{ $repo.name }}
{{- end }}
{{- range $repo := .Values.bootstrap.repositories.dockerGroup }}
    {{ $repo.name }}
{{- end }}
{{- range $repo := .Values.bootstrap.repositories.nugetProxy }}
    {{ $repo.name }}
{{- end }}
{{- range $repo := .Values.bootstrap.repositories.nugetHosted }}
    {{ $repo.name }}
{{- end }}
{{- range $repo := .Values.bootstrap.repositories.nugetGroup }}
    {{ $repo.name }}
{{- end }}
{{- range $repo := .Values.bootstrap.repositories.mavenProxy }}
    {{ $repo.name }}
{{- end }}
{{- range $repo := .Values.bootstrap.repositories.mavenHosted }}
    {{ $repo.name }}
{{- end }}
{{- range $repo := .Values.bootstrap.repositories.mavenGroup }}
    {{ $repo.name }}
{{- end }}
{{- range $repo := .Values.bootstrap.repositories.huggingfaceProxy }}
    {{ $repo.name }}
{{- end }}
{{- range $repo := .Values.bootstrap.repositories.rawProxy }}
    {{ $repo.name }}
{{- end }}
{{- range $repo := .Values.bootstrap.repositories.rawHosted }}
    {{ $repo.name }}
{{- end }}
{{- range $repo := .Values.bootstrap.repositories.rawGroup }}
    {{ $repo.name }}
{{- end }}
    EOF

    sed -i 's/^[[:space:]]*//; s/[[:space:]]*$//' "${WORKDIR}/managed-repositories.txt"
    sed -i '/^[[:space:]]*$/d' "${WORKDIR}/managed-repositories.txt"

    if [ ! -s "${WORKDIR}/managed-repositories.txt" ]; then
      echo "Repository cleanup skipped: no repositories configured in values."
      exit 0
    fi

    sort -u "${WORKDIR}/managed-repositories.txt" -o "${WORKDIR}/managed-repositories.txt"

    repositories_json=$(curl -sS --max-time 60 \
      -u "admin:${NEXUS_ADMIN_PASSWORD}" \
      "${NEXUS_API}/repositories")

    repo_lines=$(printf '%s' "${repositories_json}" | tr '\n' ' ' | sed 's/^\[//; s/\]$//' | sed 's/},[[:space:]]*{/}|{/g' | tr '|' '\n')

    if [ -z "${repo_lines}" ]; then
      echo "No repositories returned by Nexus API."
      exit 0
    fi

    printf '%s\n' "${repo_lines}" | while IFS= read -r repo_line; do
      repo_name=$(printf '%s' "${repo_line}" | sed -n 's/.*"name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')
      repo_format=$(printf '%s' "${repo_line}" | sed -n 's/.*"format"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')
      repo_type=$(printf '%s' "${repo_line}" | sed -n 's/.*"type"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')

      if [ -z "${repo_name}" ]; then
        continue
      fi

      if grep -Fqx "${repo_name}" "${WORKDIR}/managed-repositories.txt"; then
        echo "Keeping managed repository ${repo_name}"
        continue
      fi

      # Group repositories don't store objects directly; check/delete them without asset query.
      if [ "${repo_type}" = "group" ]; then
        echo "Deleting unmanaged group repository ${repo_name}"
        delete_repo_by_name "${repo_name}" "${repo_format}" "${repo_type}"
        continue
      fi

      assets_json=$(curl -sS --max-time 60 \
        -u "admin:${NEXUS_ADMIN_PASSWORD}" \
        "${NEXUS_API}/search/assets?repository=${repo_name}&limit=1")

      if printf '%s' "${assets_json}" | grep -Eq '"items":[[:space:]]*\[[[:space:]]*\{'; then
        echo "Skipping non-empty repository ${repo_name}"
        continue
      fi

      echo "Deleting unmanaged empty repository ${repo_name}"
      delete_repo_by_name "${repo_name}" "${repo_format}" "${repo_type}"
    done

    cat > "${WORKDIR}/cleanup-marker-role.json" <<'JSON'
    {"id":"helm-repository-cleanup-v2-completed","name":"Helm repository cleanup v2 completed marker","description":"Internal marker role created by Helm one-time repository cleanup","privileges":[],"roles":[]}
    JSON

    marker_status=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 60 \
      -u "admin:${NEXUS_ADMIN_PASSWORD}" \
      -H "Content-Type: application/json" \
      -X POST "${NEXUS_API}/security/roles" \
      --data-binary "@${WORKDIR}/cleanup-marker-role.json")

    if [ "${marker_status}" = "200" ] || [ "${marker_status}" = "201" ] || [ "${marker_status}" = "204" ] || [ "${marker_status}" = "400" ]; then
      echo "Repository cleanup marker processed with HTTP ${marker_status}"
    else
      echo "ERROR: could not persist repository cleanup marker, HTTP ${marker_status}" >&2
      exit 1
    fi

    echo "Repository cleanup completed successfully."
{{- end }}
{{- end }}