    upsert_json_resource "/repositories/npm/hosted/{{ $repo.name }}" "/repositories/npm/hosted" "/repositories/npm/hosted/{{ $repo.name }}" "${WORKDIR}/repo-npm-hosted-{{ regexReplaceAll "[^a-z0-9]+" (lower $repo.name) "-" | trimAll "-" }}.json" "npm hosted repository {{ $repo.name }}"
    cat > "${WORKDIR}/role-npm-hosted-{{ regexReplaceAll "[^a-z0-9]+" (lower $repo.name) "-" | trimAll "-" }}.json" <<'JSON'
