    JSON
    upsert_json_resource "/security/roles/{{ include "nexus.bootstrapRoleId" (dict "format" "npm" "name" $repo.name "access" "read") }}" "/security/roles" "/security/roles/{{ include "nexus.bootstrapRoleId" (dict "format" "npm" "name" $repo.name "access" "read") }}" "${WORKDIR}/role-npm-hosted-{{ regexReplaceAll "[^a-z0-9]+" (lower $repo.name) "-" | trimAll "-" }}.json" "role for npm hosted repository {{ $repo.name }}"
  {{- end }}
  {{- range $repo := .Values.bootstrap.repositories.npmGroup }}

    cat > "${WORKDIR}/repo-npm-group-{{ regexReplaceAll "[^a-z0-9]+" (lower $repo.name) "-" | trimAll "-" }}.json" <<'JSON'
    {{ dict "name" $repo.name "online" (default true $repo.online) "storage" (dict "blobStoreName" (default "default" $repo.blobStoreName) "strictContentTypeValidation" (default true $repo.strictContentTypeValidation)) "group" (dict "memberNames" $repo.memberNames) | toJson }}
    JSON
    upsert_json_resource "/repositories/npm/group/{{ $repo.name }}" "/repositories/npm/group" "/repositories/npm/group/{{ $repo.name }}" "${WORKDIR}/repo-npm-group-{{ regexReplaceAll "[^a-z0-9]+" (lower $repo.name) "-" | trimAll "-" }}.json" "npm group repository {{ $repo.name }}"
    cat > "${WORKDIR}/role-npm-group-{{ regexReplaceAll "[^a-z0-9]+" (lower $repo.name) "-" | trimAll "-" }}.json" <<'JSON'
    {{ dict "id" (include "nexus.bootstrapRoleId" (dict "format" "npm" "name" $repo.name "access" "read")) "name" (printf "Helm read access for npm repository %s" $repo.name) "description" (printf "Read-only access to npm repository %s managed by Helm" $repo.name) "privileges" (list (printf "nx-repository-view-npm-%s-browse" $repo.name) (printf "nx-repository-view-npm-%s-read" $repo.name)) "roles" (list) | toJson }}
    JSON
    upsert_json_resource "/security/roles/{{ include "nexus.bootstrapRoleId" (dict "format" "npm" "name" $repo.name "access" "read") }}" "/security/roles" "/security/roles/{{ include "nexus.bootstrapRoleId" (dict "format" "npm" "name" $repo.name "access" "read") }}" "${WORKDIR}/role-npm-group-{{ regexReplaceAll "[^a-z0-9]+" (lower $repo.name) "-" | trimAll "-" }}.json" "role for npm group repository {{ $repo.name }}"
  {{- end }}
{{- range $repo := .Values.bootstrap.repositories.dockerProxy }}

    cat > "${WORKDIR}/repo-docker-{{ regexReplaceAll "[^a-z0-9]+" (lower $repo.name) "-" | trimAll "-" }}.json" <<'JSON'
    {{ dict "name" $repo.name "online" (default true $repo.online) "storage" (dict "blobStoreName" (default "default" $repo.blobStoreName) "strictContentTypeValidation" (default true $repo.strictContentTypeValidation)) "proxy" (dict "remoteUrl" $repo.remoteUrl "contentMaxAge" (default 1440 $repo.contentMaxAge) "metadataMaxAge" (default 1440 $repo.metadataMaxAge)) "negativeCache" (dict "enabled" (default true $repo.negativeCacheEnabled) "timeToLive" (default 1440 $repo.negativeCacheTtl)) "httpClient" (dict "blocked" (default false $repo.httpClientBlocked) "autoBlock" (default true $repo.httpClientAutoBlock)) "docker" (dict "v1Enabled" (default false $repo.v1Enabled) "forceBasicAuth" (default false $repo.forceBasicAuth) "httpPort" $repo.targetPort "httpsPort" $repo.httpsPort) "dockerProxy" (dict "indexType" (default "REGISTRY" $repo.indexType) "cacheForeignLayers" (default false $repo.cacheForeignLayers) "foreignLayerUrlWhitelist" (default (list) $repo.foreignLayerUrlWhitelist)) | toJson }}
    JSON
    upsert_json_resource "/repositories/docker/proxy/{{ $repo.name }}" "/repositories/docker/proxy" "/repositories/docker/proxy/{{ $repo.name }}" "${WORKDIR}/repo-docker-{{ regexReplaceAll "[^a-z0-9]+" (lower $repo.name) "-" | trimAll "-" }}.json" "docker proxy repository {{ $repo.name }}"
    cat > "${WORKDIR}/role-docker-{{ regexReplaceAll "[^a-z0-9]+" (lower $repo.name) "-" | trimAll "-" }}.json" <<'JSON'
    {{ dict "id" (include "nexus.bootstrapRoleId" (dict "format" "docker" "name" $repo.name "access" "read")) "name" (printf "Helm read access for docker repository %s" $repo.name) "description" (printf "Read-only access to docker repository %s managed by Helm" $repo.name) "privileges" (list (printf "nx-repository-view-docker-%s-browse" $repo.name) (printf "nx-repository-view-docker-%s-read" $repo.name)) "roles" (list) | toJson }}
    JSON
    upsert_json_resource "/security/roles/{{ include "nexus.bootstrapRoleId" (dict "format" "docker" "name" $repo.name "access" "read") }}" "/security/roles" "/security/roles/{{ include "nexus.bootstrapRoleId" (dict "format" "docker" "name" $repo.name "access" "read") }}" "${WORKDIR}/role-docker-{{ regexReplaceAll "[^a-z0-9]+" (lower $repo.name) "-" | trimAll "-" }}.json" "role for docker repository {{ $repo.name }}"
{{- end }}
  {{- range $repo := .Values.bootstrap.repositories.dockerHosted }}

    cat > "${WORKDIR}/repo-docker-hosted-{{ regexReplaceAll "[^a-z0-9]+" (lower $repo.name) "-" | trimAll "-" }}.json" <<'JSON'
    {{ dict "name" $repo.name "online" (default true $repo.online) "storage" (dict "blobStoreName" (default "default" $repo.blobStoreName) "strictContentTypeValidation" (default true $repo.strictContentTypeValidation) "writePolicy" (default "ALLOW" $repo.writePolicy)) "docker" (dict "v1Enabled" (default false $repo.v1Enabled) "forceBasicAuth" (default false $repo.forceBasicAuth) "httpPort" $repo.targetPort "httpsPort" $repo.httpsPort) | toJson }}
    JSON
    upsert_json_resource "/repositories/docker/hosted/{{ $repo.name }}" "/repositories/docker/hosted" "/repositories/docker/hosted/{{ $repo.name }}" "${WORKDIR}/repo-docker-hosted-{{ regexReplaceAll "[^a-z0-9]+" (lower $repo.name) "-" | trimAll "-" }}.json" "docker hosted repository {{ $repo.name }}"
    cat > "${WORKDIR}/role-docker-hosted-{{ regexReplaceAll "[^a-z0-9]+" (lower $repo.name) "-" | trimAll "-" }}.json" <<'JSON'
    {{ dict "id" (include "nexus.bootstrapRoleId" (dict "format" "docker" "name" $repo.name "access" "read")) "name" (printf "Helm read access for docker repository %s" $repo.name) "description" (printf "Read-only access to docker repository %s managed by Helm" $repo.name) "privileges" (list (printf "nx-repository-view-docker-%s-browse" $repo.name) (printf "nx-repository-view-docker-%s-read" $repo.name)) "roles" (list) | toJson }}
    JSON
    upsert_json_resource "/security/roles/{{ include "nexus.bootstrapRoleId" (dict "format" "docker" "name" $repo.name "access" "read") }}" "/security/roles" "/security/roles/{{ include "nexus.bootstrapRoleId" (dict "format" "docker" "name" $repo.name "access" "read") }}" "${WORKDIR}/role-docker-hosted-{{ regexReplaceAll "[^a-z0-9]+" (lower $repo.name) "-" | trimAll "-" }}.json" "role for docker hosted repository {{ $repo.name }}"
  {{- end }}
  {{- range $repo := .Values.bootstrap.repositories.dockerGroup }}

    cat > "${WORKDIR}/repo-docker-group-{{ regexReplaceAll "[^a-z0-9]+" (lower $repo.name) "-" | trimAll "-" }}.json" <<'JSON'
    {{ dict "name" $repo.name "online" (default true $repo.online) "storage" (dict "blobStoreName" (default "default" $repo.blobStoreName) "strictContentTypeValidation" (default true $repo.strictContentTypeValidation)) "group" (dict "memberNames" $repo.memberNames) "docker" (dict "v1Enabled" (default false $repo.v1Enabled) "forceBasicAuth" (default false $repo.forceBasicAuth) "httpPort" $repo.targetPort "httpsPort" $repo.httpsPort) | toJson }}
    JSON
    upsert_json_resource "/repositories/docker/group/{{ $repo.name }}" "/repositories/docker/group" "/repositories/docker/group/{{ $repo.name }}" "${WORKDIR}/repo-docker-group-{{ regexReplaceAll "[^a-z0-9]+" (lower $repo.name) "-" | trimAll "-" }}.json" "docker group repository {{ $repo.name }}"
    cat > "${WORKDIR}/role-docker-group-{{ regexReplaceAll "[^a-z0-9]+" (lower $repo.name) "-" | trimAll "-" }}.json" <<'JSON'
