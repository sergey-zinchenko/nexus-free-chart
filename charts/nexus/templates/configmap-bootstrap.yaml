    JSON
    upsert_json_resource "/security/roles/{{ include "nexus.bootstrapRoleId" (dict "format" "docker" "name" $repo.name "access" "read") }}" "/security/roles" "/security/roles/{{ include "nexus.bootstrapRoleId" (dict "format" "docker" "name" $repo.name "access" "read") }}" "${WORKDIR}/role-docker-group-{{ regexReplaceAll "[^a-z0-9]+" (lower $repo.name) "-" | trimAll "-" }}.json" "role for docker group repository {{ $repo.name }}"
  {{- end }}
{{- range $repo := .Values.bootstrap.repositories.huggingfaceProxy }}

    hf_bearer_token=""
{{- if and $repo.bearerTokenFromSecret $repo.bearerTokenFromSecret.name $repo.bearerTokenFromSecret.key }}
    if [ -f "/bootstrap-secrets/huggingface-{{ regexReplaceAll "[^a-z0-9]+" (lower $repo.name) "-" | trimAll "-" }}.bearerToken" ]; then
      hf_bearer_token="$(cat /bootstrap-secrets/huggingface-{{ regexReplaceAll "[^a-z0-9]+" (lower $repo.name) "-" | trimAll "-" }}.bearerToken)"
    fi
{{- end }}
    hf_bearer_token_escaped="$(json_escape "${hf_bearer_token}")"
    hf_auth_fragment=""
    if [ -n "${hf_bearer_token}" ]; then
      hf_auth_fragment=",\"authentication\":{\"type\":\"bearerToken\",\"bearerToken\":\"${hf_bearer_token_escaped}\"}"
    fi

    cat > "${WORKDIR}/repo-huggingface-{{ regexReplaceAll "[^a-z0-9]+" (lower $repo.name) "-" | trimAll "-" }}.json" <<JSON
    {"name":{{ $repo.name | quote }},"online":{{ default true $repo.online }} ,"storage":{"blobStoreName":{{ default "default" $repo.blobStoreName | quote }},"strictContentTypeValidation":{{ default true $repo.strictContentTypeValidation }}},"proxy":{"remoteUrl":{{ $repo.remoteUrl | quote }},"contentMaxAge":{{ default 1440 $repo.contentMaxAge }},"metadataMaxAge":{{ default 1440 $repo.metadataMaxAge }}},"negativeCache":{"enabled":{{ default true $repo.negativeCacheEnabled }},"timeToLive":{{ default 1440 $repo.negativeCacheTtl }}},"httpClient":{"blocked":{{ default false $repo.httpClientBlocked }},"autoBlock":{{ default true $repo.httpClientAutoBlock }}${hf_auth_fragment}}}
    JSON

    # Migrate legacy raw proxy with the same name to the new huggingface format.
    if resource_exists "/repositories/raw/proxy/{{ $repo.name }}" && ! resource_exists "/repositories/huggingface/proxy/{{ $repo.name }}"; then
      echo "Deleting legacy raw proxy repository {{ $repo.name }} before creating huggingface proxy"

      delete_status=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 60 \
        -u "admin:${NEXUS_ADMIN_PASSWORD}" \
        -X DELETE "${NEXUS_API}/repositories/raw/proxy/{{ $repo.name }}")

      if [ "${delete_status}" = "204" ] || [ "${delete_status}" = "404" ]; then
        echo "DELETE /repositories/raw/proxy/{{ $repo.name }} -> HTTP ${delete_status}"
      elif [ "${delete_status}" = "405" ]; then
        # Some Nexus versions only support delete by repository name.
        delete_status2=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 60 \
          -u "admin:${NEXUS_ADMIN_PASSWORD}" \
          -X DELETE "${NEXUS_API}/repositories/{{ $repo.name }}")
        if [ "${delete_status2}" = "204" ] || [ "${delete_status2}" = "404" ]; then
          echo "DELETE /repositories/{{ $repo.name }} -> HTTP ${delete_status2}"
        else
          echo "ERROR: DELETE /repositories/{{ $repo.name }} returned HTTP ${delete_status2}" >&2
          exit 1
        fi
      else
        echo "ERROR: DELETE /repositories/raw/proxy/{{ $repo.name }} returned HTTP ${delete_status}" >&2
        exit 1
