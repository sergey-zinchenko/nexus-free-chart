{{- if and .Values.bootstrap.enabled .Values.bootstrap.repositoryCleanup.enabled }}
{{- $managedRepos := concat (default (list) .Values.bootstrap.repositories.pypiProxy) (default (list) .Values.bootstrap.repositories.pypiHosted) (default (list) .Values.bootstrap.repositories.pypiGroup) (default (list) .Values.bootstrap.repositories.npmProxy) (default (list) .Values.bootstrap.repositories.npmHosted) (default (list) .Values.bootstrap.repositories.npmGroup) (default (list) .Values.bootstrap.repositories.dockerProxy) (default (list) .Values.bootstrap.repositories.dockerHosted) (default (list) .Values.bootstrap.repositories.dockerGroup) (default (list) .Values.bootstrap.repositories.nugetProxy) (default (list) .Values.bootstrap.repositories.nugetHosted) (default (list) .Values.bootstrap.repositories.nugetGroup) (default (list) .Values.bootstrap.repositories.mavenProxy) (default (list) .Values.bootstrap.repositories.mavenHosted) (default (list) .Values.bootstrap.repositories.mavenGroup) (default (list) .Values.bootstrap.repositories.huggingfaceProxy) (default (list) .Values.bootstrap.repositories.rawHosted) (default (list) .Values.bootstrap.repositories.rawProxy) (default (list) .Values.bootstrap.repositories.rawGroup) }}
{{- if gt (len $managedRepos) 0 }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "nexus.fullname" . }}-repository-cleanup
  labels:
    {{- include "nexus.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "30"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.bootstrap.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.bootstrap.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        {{- include "nexus.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: repository-cleanup-job
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "nexus.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: repository-cleanup
          image: {{ printf "%s:%s" .Values.bootstrap.image.repository .Values.bootstrap.image.tag }}
          imagePullPolicy: {{ .Values.bootstrap.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: NEXUS_URL
              value: "http://{{ include "nexus.fullname" . }}-hl:8081"
            - name: NEXUS_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "nexus.adminSecretName" . }}
                  key: {{ include "nexus.adminSecretPasswordKey" . }}
          command:
            - /bin/sh
            - /bootstrap/cleanup-orphan-repositories.sh
          volumeMounts:
            - name: bootstrap-script
              mountPath: /bootstrap
              readOnly: true
            - name: cleanup-work
              mountPath: /work
          resources:
            requests:
              cpu: "0.05"
              memory: "64Mi"
            limits:
              cpu: "0.2"
              memory: "256Mi"
      volumes:
        - name: bootstrap-script
          configMap:
            name: {{ include "nexus.bootstrapConfigMapName" . }}
            defaultMode: 0555
        - name: cleanup-work
          emptyDir: {}
{{- end }}
{{- end }}
