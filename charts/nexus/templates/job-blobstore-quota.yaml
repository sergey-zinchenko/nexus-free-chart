{{- if .Values.blobstoreQuota.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "nexus.fullname" . }}-blobstore-quota
  labels:
    {{- include "nexus.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        {{- include "nexus.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: blobstore-quota-job
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "nexus.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: set-quota
          image: curlimages/curl:8.7.1
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: NEXUS_URL
              value: "http://{{ include "nexus.fullname" . }}-hl:8081"
            - name: BLOB_STORE_NAME
              value: {{ .Values.blobstoreQuota.blobStoreName | quote }}
            - name: QUOTA_LIMIT_BYTES
              value: {{ .Values.blobstoreQuota.limitBytes | quote }}
            - name: NEXUS_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "nexus.adminSecretName" . }}
                  key: {{ include "nexus.adminSecretPasswordKey" . }}
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Waiting for Nexus to be writable..."
              until curl -sf -o /dev/null "${NEXUS_URL}/service/rest/v1/status/writable"; do
                echo "  not writable yet, retrying in 15s..."
                sleep 15
              done
              echo "Nexus is ready. Updating blob store quota..."
              RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 30 \
                -u "admin:${NEXUS_ADMIN_PASSWORD}" \
                -X PUT "${NEXUS_URL}/service/rest/v1/blobstores/file/${BLOB_STORE_NAME}" \
                -H "Content-Type: application/json" \
                -d "{\"name\":\"${BLOB_STORE_NAME}\",\"path\":\"${BLOB_STORE_NAME}\",\"softQuota\":{\"type\":\"spaceUsedQuota\",\"limit\":${QUOTA_LIMIT_BYTES}}}")
              HTTP_STATUS=$(echo "${RESPONSE}" | tail -1)
              BODY=$(echo "${RESPONSE}" | head -1)
              echo "Response (HTTP ${HTTP_STATUS}): ${BODY}"
              if [ "${HTTP_STATUS}" != "204" ] && [ "${HTTP_STATUS}" != "200" ]; then
                echo "ERROR: unexpected HTTP status ${HTTP_STATUS}"
                exit 1
              fi
              echo "Blob store quota updated successfully."
          resources:
            requests:
              cpu: "0.05"
              memory: "32Mi"
            limits:
              cpu: "0.1"
              memory: "64Mi"
{{- end }}
