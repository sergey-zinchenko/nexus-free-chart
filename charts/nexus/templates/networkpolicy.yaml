{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "nexus.fullname" . }}
  labels:
    {{- include "nexus.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "nexus.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        {{- if .Values.networkPolicy.allowSameNamespace }}
        - podSelector: {}
        {{- end }}
        {{- with .Values.networkPolicy.ingressFrom }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.statefulset.container.containerPort }}
  egress:
    - to:
        {{- if .Values.networkPolicy.egress.allowDns }}
        - namespaceSelector: {}
        {{- end }}
      ports:
        {{- if .Values.networkPolicy.egress.allowDns }}
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
        {{- end }}
    {{- if .Values.networkPolicy.egress.allowPostgresql }}
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 5432
    {{- end }}
{{- end }}
