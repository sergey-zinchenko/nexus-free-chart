{{- if .Values.logStorage.combineTaskLogs }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ template "nexus.fullname" . }}-logback-tasklogfile-override
data:
  logback-tasklogfile-appender-override.xml: |
    <included>
      <appender name="tasklogfile" class="ch.qos.logback.core.rolling.RollingFileAppender">
        <File>/nexus-data/log/tasks/allTasks.log</File>
        <Append>true</Append>
        <encoder class="ch.qos.logback.classic.encoder.PatternLayoutEncoder">
          <pattern>%d{"yyyy-MM-dd HH:mm:ss,SSSZ"} %-5p [%thread] %mdc{userId:-*SYSTEM} %c - %m%n</pattern>
        </encoder>
        <rollingPolicy class="ch.qos.logback.core.rolling.TimeBasedRollingPolicy">
          <fileNamePattern>/nexus-data/log/tasks/allTasks-%d{yyyy-MM-dd}.log.gz</fileNamePattern>
          <maxHistory>7</maxHistory>
        </rollingPolicy>
      </appender>
    </included>
{{- end }}