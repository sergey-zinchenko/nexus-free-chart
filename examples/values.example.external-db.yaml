# External PostgreSQL example

postgresql:
  enabled: false

secret:
  existingDbSecret:
    enabled: true
    name: nexus-dbsecret
    usernameKey: db-user
    passwordKey: db-password

statefulset:
  container:
    env:
      dbHost: postgres.example.internal
      nexusDBPort: 5432
      nexusDBName: nexus
      jdbcUrlParams: sslmode=require
